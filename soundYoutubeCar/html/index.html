<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube Car Music</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        #music-ui {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 380px;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            border-radius: 10px;
            padding: 15px;
            z-index: 99999;
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.6);
            font-family: Arial, sans-serif;
            max-height: 210px; /* ここで高さを大幅に制限 */
        }
    </style>
</head>
<body>
    <div id="music-ui">
        <div class="header">
            <h3>🚗 YouTube Music</h3>
            <button onclick="closeUI()" class="close-btn">×</button>
        </div>
        
        <input type="text" id="urlInput" placeholder="YouTubeリンクを貼り付け (例: https://youtu.be/xxxx)" class="url-input">
        
        <div class="controls">
            <button onclick="loadAndPlay()" class="btn load">ロードして再生</button>
            <button onclick="playMusic()" class="btn play">▶ 再生</button>
            <button onclick="pauseMusic()" class="btn pause">⏸ 一時停止</button>
        </div>

        <div class="volume-section">
            <button id="muteBtn" onclick="toggleMute()">🔊</button>
            <input type="range" id="volumeSlider" min="0" max="100" value="50" step="1">
            <span id="volumeDisplay">50</span>
        </div>
        
        <div class="status" id="status">待機中...</div>
        
        <div id="player" style="position: absolute; left: -9999px; top: -9999px;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
